<section class="breadcrumbs">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center">
      <h2>Blog</h2>
      <ol>
        <li><a href="../../">Home</a></li>
        <li><a href="../">Blog</a></li>
        <li>{{title}}</li>
      </ol>
    </div>
  </div>
</section>

<section id="blog-post" class="blog-post">
  <div class="container" data-aos="fade-up">
    <div class="row">
      <div class="col-lg-12">
        <article class="entry entry-single">
          <h1 class="entry-title">{{title}}</h1>
          <div class="entry-meta">
            <ul>
              <li class="d-flex align-items-center"><i class="bi bi-calendar"></i> <time datetime="{{date}}">{{date}}</time></li>
              <li class="d-flex align-items-center"><i class="bi bi-clock"></i> {{read_time}} min</li>
            </ul>
          </div>
          <div class="entry-tags">
            <i class="bi bi-tags"></i>
            <ul class="tags">
              {{tags_html}}
            </ul>
          </div>
          <div class="entry-content">
            {{content}}
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
